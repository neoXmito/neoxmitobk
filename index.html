<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BK Pro Trainer</title>
<meta name="theme-color" content="#da291c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BK Pro">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<style>
:root{--bk-red:#da291c;--bk-blue:#0033a0;--bk-yellow:#f2a900;--bk-brown:#512214;}
*{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;height:100dvh;}
body{font-family:'Barlow Condensed',sans-serif;background:#e8e3db;display:flex;flex-direction:column;height:100%;height:100dvh;max-height:100%;overflow:hidden;position:fixed;inset:0;}

/* HEADER */
#hdr{background:var(--bk-red);color:white;display:flex;justify-content:space-between;align-items:center;padding:8px 12px;flex-shrink:0;border-bottom:2px solid #a01f15;}
#hdr h1{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;}
.stats{display:flex;gap:8px;font-size:13px;font-weight:700;}
.stats span{background:rgba(0,0,0,0.25);padding:3px 8px;border-radius:4px;}
.btn-cfg{background:var(--bk-yellow);color:var(--bk-brown);border:none;padding:5px 10px;font-family:'Bebas Neue',sans-serif;font-size:15px;border-radius:3px;cursor:pointer;}

/* KDS STRIP */
#kds-strip{background:#111;padding:6px 10px;flex-shrink:0;border-bottom:2px solid #222;display:flex;align-items:center;gap:8px;overflow-x:auto;}
#kds-strip::-webkit-scrollbar{height:3px;}
#kds-strip::-webkit-scrollbar-thumb{background:#333;}
.kds-pill{background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:4px 10px;white-space:nowrap;flex-shrink:0;font-size:12px;font-weight:700;color:#555;}
.kds-pill.active{border-color:#00ff00;color:#00ff00;background:#0a1f0a;}
.kds-pill.done{opacity:0.3;}

/* TOP INGREDIENT SCROLL */
#top-bar{background:white;border-bottom:2px solid #ddd;display:flex;overflow-x:auto;padding:6px 8px;gap:0;flex-shrink:0;}
#top-bar::-webkit-scrollbar{height:3px;}
#top-bar::-webkit-scrollbar-thumb{background:#ccc;}
.top-station{display:flex;flex-direction:column;border-right:1.5px solid #eee;padding:0 8px 0 6px;flex-shrink:0;}
.top-station:last-child{border-right:none;}
.top-station-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;padding-bottom:2px;border-bottom:2px solid currentColor;}
.top-station[data-z=bun] .top-station-label{color:var(--bk-brown);}
.top-station[data-z=sauce] .top-station-label{color:#c47d00;}
.top-station[data-z=garniture] .top-station-label{color:#2e7d32;}
.top-items{display:flex;gap:4px;}
.ing{padding:4px 5px;cursor:pointer;background:#fff;border:1.5px solid #ddd;border-radius:6px;font-weight:700;font-size:10px;text-align:center;width:64px;flex-shrink:0;transition:border-color 0.15s;user-select:none;-webkit-tap-highlight-color:transparent;}
.ing:active{border-color:var(--bk-red);background:#fff5f5;}
.ing img{width:42px;height:28px;object-fit:contain;display:block;margin:0 auto 2px;pointer-events:none;}

/* MID LAYOUT */
#mid{flex:1;display:flex;overflow:hidden;min-height:0;max-height:100%;}

/* ASSEMBLY BOARDS */
#assembly{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:6px;background:#f0ebe2;overflow:hidden;min-width:0;min-height:0;}
.board{border:2px dashed #ccc;border-radius:10px;display:flex;flex-direction:column;background:white;overflow:hidden;min-height:0;}
.board h4{text-align:center;padding:6px;background:var(--bk-brown);color:white;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;flex-shrink:0;}
.board.crown h4{background:var(--bk-blue);}
.drop-zone{flex:1;display:flex;flex-direction:column-reverse;align-items:center;padding:6px;gap:4px;overflow-y:auto;min-height:0;}
.drop-zone::-webkit-scrollbar{width:3px;}
.drop-zone::-webkit-scrollbar-thumb{background:#ddd;}
.drop-zone.drag-over{background:#fff3e0;}
.on-board{width:100%;max-width:130px;padding:4px 6px;display:flex;align-items:center;gap:5px;background:white;border:1.5px solid #e0e0e0;border-radius:6px;animation:sIn 0.12s ease;flex-shrink:0;}
@keyframes sIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.on-board img{height:26px;width:36px;object-fit:contain;flex-shrink:0;}
.on-board span{font-size:10px;font-weight:700;color:#444;text-transform:uppercase;flex:1;line-height:1.1;}
.remove-btn{cursor:pointer;color:#bbb;font-size:16px;line-height:1;flex-shrink:0;padding:2px;}
.remove-btn:active{color:var(--bk-red);}

/* RIGHT SIDE */
#right-side{width:80px;background:white;border-left:2px solid #ddd;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
#right-side::-webkit-scrollbar{width:3px;}
#right-side::-webkit-scrollbar-thumb{background:#ccc;}
.r-zone-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;border-bottom:1.5px solid;padding-bottom:2px;margin-bottom:3px;}
.r-zone-label.viande{color:#a33;border-color:#a33;}
.r-zone-label.poulet{color:#c07000;border-color:#c07000;}
.r-zone-label.fish{color:#1565c0;border-color:#1565c0;}
.r-zone-label.veggie{color:#2e7d32;border-color:#2e7d32;}
.r-zone-label.fromage{color:#f9a825;border-color:#f9a825;}
.r-zone-label.charcuterie{color:#7b1fa2;border-color:#7b1fa2;}
#right-side .ing{width:100%;font-size:9px;}
#right-side .ing img{width:38px;height:26px;}

/* FOOTER */
footer{background:white;border-top:2px solid #ccc;display:flex;justify-content:center;align-items:center;gap:8px;padding:6px 10px;flex-shrink:0;}
.btn{padding:9px 0;border:none;border-radius:4px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;cursor:pointer;flex:1;max-width:140px;}
.btn-blue{background:var(--bk-blue);color:white;}
.btn-brown{background:var(--bk-brown);color:white;}

/* PLACEMENT POPUP */
#placement-popup{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#222;border:2px solid var(--bk-red);border-radius:10px;padding:10px 14px;z-index:500;display:flex;gap:10px;align-items:center;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
.pop-name{color:white;font-size:12px;font-weight:700;white-space:nowrap;}
.pop-btn{border:none;border-radius:4px;padding:7px 14px;font-family:'Bebas Neue',sans-serif;font-size:15px;cursor:pointer;letter-spacing:1px;}
.pop-heel{background:var(--bk-brown);color:white;}
.pop-crown{background:var(--bk-blue);color:white;}
.pop-close{background:#555;color:white;font-size:15px;}

/* CONFIG PANEL */
#cfg{display:none;position:fixed;top:0;left:0;right:0;z-index:300;background:#222;color:white;padding:14px;border-bottom:4px solid var(--bk-blue);}
#cfg label{font-size:13px;margin-right:6px;}
#cfg input[type=number]{width:55px;padding:3px 6px;font-size:14px;border:1px solid #555;background:#333;color:white;border-radius:3px;}
#cfg textarea{width:100%;height:80px;font-family:monospace;font-size:10px;background:#111;color:#0f0;border:1px solid #555;padding:6px;margin-top:8px;border-radius:3px;}
.btn-sm{padding:7px 16px;border:none;border-radius:4px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;cursor:pointer;}

/* RESULTS SCREEN */
#results{display:none;position:fixed;inset:0;background:#f4f1ec;z-index:200;overflow-y:auto;padding:16px;}
.res-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.res-header h1{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--bk-brown);letter-spacing:2px;}
#final-score{background:white;padding:12px;border-radius:8px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:14px;}
.res-card{background:white;border-radius:8px;padding:14px;margin-bottom:16px;border-left:6px solid #ccc;}
.res-card.ok{border-left-color:#4CAF50;}
.res-card.bad{border-left-color:var(--bk-red);}
.res-card h2{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;}
.res-sub{font-size:12px;color:#888;margin-bottom:8px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;}
.col-title{text-align:center;font-size:11px;font-weight:700;color:#777;margin-bottom:6px;}
.btower{display:flex;flex-direction:column-reverse;align-items:center;background:#fafafa;padding:8px;border-radius:8px;border:1px solid #eee;gap:3px;}
.titem{display:flex;align-items:center;gap:6px;width:100%;}
.titem img{width:50px;height:30px;object-fit:contain;flex-shrink:0;}
.titem span{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;line-height:1.1;}
.tdiv{width:80%;height:1px;background:#eee;margin:0 auto;}
.tmark{display:flex;align-items:center;gap:5px;width:100%;margin:4px 0;}
.tmark-line{flex:1;height:2px;background:var(--bk-red);border-radius:2px;}
.tmark-lbl{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:1px;color:var(--bk-red);white-space:nowrap;}
</style>
</head>

<div id="cfg">

    <label>Commandes:</label>
    <input type="number" id="order-count-input" value="10" min="1" max="50">
    <button class="btn-sm btn-blue" onclick="saveData()">Appliquer</button>
    <button class="btn-sm" style="background:#555;color:white;" onclick="toggleCfg()">Fermer</button>
  </div>
  <textarea id="json-input"></textarea>
</div>

<header id="hdr">
  <div style="display:flex;align-items:center;gap:8px;">
    <h1>🍔 BK PRO</h1>
    <button class="btn-cfg" onclick="toggleCfg()">⚙</button>
  </div>
  <div class="stats">
    <span id="stat-order">1/10</span>
    <span>✓ <span id="stat-score">0</span></span>
  </div>
</header>

<div id="kds-strip"></div>
<div id="top-bar"></div>

<div id="mid">
  <div id="assembly">
    <div class="board">
      <h4>HEEL</h4>
      <div class="drop-zone" id="heel-zone"
           ondrop="drop(event)" ondragover="allowDrop(event)"
           ondragenter="this.classList.add('drag-over')"
           ondragleave="this.classList.remove('drag-over')"></div>
    </div>
    <div class="board crown">
      <h4>CROWN</h4>
      <div class="drop-zone" id="crown-zone"
           ondrop="drop(event)" ondragover="allowDrop(event)"
           ondragenter="this.classList.add('drag-over')"
           ondragleave="this.classList.remove('drag-over')"></div>
    </div>
  </div>
  <div id="right-side"></div>
</div>

<footer>
  <button class="btn btn-brown" onclick="clearBoards()">🗑 TRASH</button>
  <button class="btn btn-blue" onclick="serveOrder()">🚀 SERVE</button>
</footer>

<div id="results">
  <div class="res-header">
    <h1>RÉSULTATS</h1>
    <button class="btn-sm btn-blue" onclick="location.reload()">↺ RESTART</button>
  </div>
  <div id="final-score"></div>
  <div id="results-list"></div>
</div>

    {name:"Veggie Steakhouse",gamme:"Veggie",production:2,
      heel:["talon-bun-45","patty-rebel","fromage-2","bacon-vegetal","sauce-bbq","onion-frits"],
      crown:["couronne-bun-45","mayo-14g","onion-frits","laitue","tomate-2"]},
    {name:"Veggie Chkn Louisiane",gamme:"Veggie",production:2,
      heel:["talon-bun-45","sauce-cajun","patty-veggie-chicken","fromage-2","bacon-vegetal"],
      crown:["couronne-bun-45","sauce-cajun","onion-frits","laitue","tomate-2"]},
    {name:"Crispy Chicken Cheese",gamme:"Chicken/Fish",production:3,
      heel:["talon-bun-4","patty-crispy-chicken","fromage-1","sauce-bbq"],
      crown:["couronne-bun-4","mayo","laitue","tomate-1"]},
    {name:"King Chicken",gamme:"Chicken/Fish",production:3,
      heel:["talon-bun-4","patty-crispy-chicken"],
      crown:["couronne-bun-4","sauce-cajun","laitue"]},
    {name:"Chicken Spicy",gamme:"Chicken/Fish",production:3,
      heel:["talon-bun-45","sauce-spicy-andalouse","patty-chicken-premium","fromage-2"],
      crown:["couronne-bun-45","sauce-spicy-andalouse","laitue"]},
    {name:"Big Fish",gamme:"Chicken/Fish",production:3,
      heel:["talon-bun-4","sauce-king","patty-fish","fromage-1"],
      crown:["couronne-bun-4","sauce-king","laitue","tomate-1"]},
    {name:"King Fish",gamme:"Chicken/Fish",production:3,
      heel:["talon-bun-4","patty-fish"],
      crown:["couronne-bun-4","sauce-cajun","laitue"]},
    {name:"Kid Fishburger",gamme:"Chicken/Fish",production:3,
      heel:["talon-bun-4","patty-fish","ketchup"],
      crown:["couronne-bun-4"]},
    {name:"Wrap Chicken Louisiane",gamme:"Wrap",production:2,
      heel:[""],
      crown:["tortilla","sauce-cajun","onion-frits","patty-crispy-chicken-coupe","fromage-2","laitue","tomate-2"]},
    {name:"Wrap Crousty Chèvre",gamme:"Wrap",production:2,
      heel:[""],
      crown:["tortilla","sauce-cajun","onion-frits","crousty-chevre","fromage-2","laitue","tomate-2"]},
    {name:"Wrap Cheese & Bacon",gamme:"Wrap",production:2,
      heel:[""],
      crown:["tortilla","mayo","onion-frits","patty-crispy-chicken-coupe","fromage-2","sauce-bbq","bacon-2","laitue"]}
  ]
};

const TOP_ZONES = [
  {key:"bun",      label:"Pains"},
  {key:"sauce",    label:"Sauces"},
  {key:"garniture",label:"Garniture"}
];
const RIGHT_ZONES = [
  {key:"viande",      label:"Viande Bœuf"},
  {key:"poulet",      label:"Poulet"},
  {key:"fish",        label:"Poisson"},
  {key:"veggie",      label:"Veggie"},
  {key:"fromage",     label:"Fromage"},
  {key:"charcuterie", label:"Charcuterie"}
];

let sessionOrders = [], userHistory = [], currentIdx = 0, score = 0, totalRounds = 10;
let pendingIng = null;

function init() {
  document.getElementById('json-input').value = JSON.stringify(bkData, null, 2);
  renderIngredients();
  generateOrders();
  updateKDS();
}

function generateOrders() {
  sessionOrders = [];
  totalRounds = parseInt(document.getElementById('order-count-input').value) || 10;
  for (let i = 0; i < totalRounds; i++) {
    const r = bkData.recipes[Math.floor(Math.random() * bkData.recipes.length)];
    sessionOrders.push({...r, orderNum: i + 1});
  }
  updateStatDisplay();
}

function updateStatDisplay() {
  document.getElementById('stat-order').textContent = `${Math.min(currentIdx + 1, totalRounds)}/${totalRounds}`;
  document.getElementById('stat-score').textContent = score;
}

function renderIngredients() {
  const topBar = document.getElementById('top-bar');
  const rightSide = document.getElementById('right-side');
  topBar.innerHTML = '';
  rightSide.innerHTML = '';

  TOP_ZONES.forEach(zone => {
    const items = bkData.ingredients.filter(i => i.zone === zone.key);
    if (!items.length) return;
    const g = document.createElement('div');
    g.className = 'top-station';
    g.dataset.z = zone.key;
    g.innerHTML = `<div class="top-station-label">${zone.label}</div><div class="top-items"></div>`;
    const row = g.querySelector('.top-items');
    items.forEach(ing => row.appendChild(makeIng(ing)));
    topBar.appendChild(g);
  });

  RIGHT_ZONES.forEach(zone => {
    const items = bkData.ingredients.filter(i => i.zone === zone.key);
    if (!items.length) return;
    const sec = document.createElement('div');
    sec.innerHTML = `<div class="r-zone-label ${zone.key}">${zone.label}</div><div class="r-items"></div>`;
    const row = sec.querySelector('.r-items');
    items.forEach(ing => row.appendChild(makeIng(ing)));
    rightSide.appendChild(sec);
  });
}

function makeIng(ing) {
  const el = document.createElement('div');
  el.className = 'ing';
  el.draggable = true;
  el.innerHTML = `<img src="${ing.img}" onerror="this.style.display='none'"><span>${ing.name}</span>`;
  // Drag support (desktop)
  el.ondragstart = e => e.dataTransfer.setData("id", ing.id);
  // Tap support (mobile)
  el.addEventListener('click', () => showPlacementChoice(ing));
  return el;
}

function showPlacementChoice(ing) {
  pendingIng = ing;
  const existing = document.getElementById('placement-popup');
  if (existing) existing.remove();
  const popup = document.createElement('div');
  popup.id = 'placement-popup';
  popup.innerHTML = `
    <span class="pop-name">${ing.name}</span>
    <button class="pop-btn pop-heel" onclick="addToBoard('heel-zone')">HEEL</button>
    <button class="pop-btn pop-crown" onclick="addToBoard('crown-zone')">CROWN</button>
    <button class="pop-btn pop-close" onclick="document.getElementById('placement-popup').remove()">✕</button>`;
  document.body.appendChild(popup);
  setTimeout(() => { const p = document.getElementById('placement-popup'); if (p) p.remove(); }, 4000);
}

function addToBoard(zoneId) {
  const popup = document.getElementById('placement-popup');
  if (popup) popup.remove();
  if (!pendingIng) return;
  const zone = document.getElementById(zoneId);
  const el = document.createElement('div');
  el.className = 'on-board';
  el.dataset.id = pendingIng.id;
  el.innerHTML = `<img src="${pendingIng.img}" onerror="this.style.display='none'"><span>${pendingIng.name}</span><b class="remove-btn" onclick="this.parentElement.remove()">×</b>`;
  zone.appendChild(el);
  pendingIng = null;
}

// Drag & drop (desktop fallback)
function allowDrop(ev) { ev.preventDefault(); }
function drop(ev) {
  ev.preventDefault();
  ev.currentTarget.classList.remove('drag-over');
  const id = ev.dataTransfer.getData("id");
  const ing = bkData.ingredients.find(i => i.id === id);
  if (!ing) return;
  const el = document.createElement('div');
  el.className = 'on-board';
  el.dataset.id = id;
  el.innerHTML = `<img src="${ing.img}" onerror="this.style.display='none'"><span>${ing.name}</span><b class="remove-btn" onclick="this.parentElement.remove()">×</b>`;
  ev.currentTarget.appendChild(el);
}

function updateKDS() {
  const strip = document.getElementById('kds-strip');
  strip.innerHTML = '';
  sessionOrders.forEach((order, idx) => {
    const d = document.createElement('div');
    d.className = 'kds-pill' + (idx === currentIdx ? ' active' : idx < currentIdx ? ' done' : '');
    d.innerHTML = `#${order.orderNum} <strong>${order.name}</strong> <span style="opacity:0.6;font-weight:400;">· par ${order.production}</span>`;
    strip.appendChild(d);
  });
  const active = strip.querySelector('.active');
  if (active) active.scrollIntoView({block:'nearest', inline:'center'});
}

function serveOrder() {
  const heel = Array.from(document.getElementById('heel-zone').children).map(c => c.dataset.id);
  const crown = Array.from(document.getElementById('crown-zone').children).map(c => c.dataset.id);
  const target = sessionOrders[currentIdx];
  const isPerfect = JSON.stringify(heel) === JSON.stringify(target.heel) &&
                    JSON.stringify(crown) === JSON.stringify(target.crown);
  if (isPerfect) score++;
  userHistory.push({name: target.name, gamme: target.gamme,
    correct: {heel: target.heel, crown: target.crown},
    user: {heel, crown}, isPerfect});
  currentIdx++;
  if (currentIdx < totalRounds) {
    updateStatDisplay();
    updateKDS();
    clearBoards();
  } else {
    showResults();
  }
}

function showResults() {
  document.getElementById('results').style.display = 'block';
  document.getElementById('final-score').textContent =
    `SCORE: ${score} / ${totalRounds} (${Math.round(score / totalRounds * 100)}%)`;
  const list = document.getElementById('results-list');
  list.innerHTML = '';
  userHistory.forEach((h, i) => {
    const card = document.createElement('div');
    card.className = `res-card ${h.isPerfect ? 'ok' : 'bad'}`;
    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <h2>#${i+1} ${h.name}</h2>
          <div class="res-sub">${h.gamme}</div>
        </div>
        <span style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:${h.isPerfect ? '#4CAF50' : 'var(--bk-red)'};">
          ${h.isPerfect ? '✓ OK' : '✗ ERREUR'}
        </span>
      </div>
      <div class="two-col">
        <div>
          <div class="col-title">VOTRE BURGER</div>
          <div class="btower">${renderTower(h.user.heel, h.user.crown)}</div>
        </div>
        <div>
          <div class="col-title">RECETTE CORRECTE</div>
          <div class="btower">${renderTower(h.correct.heel, h.correct.crown)}</div>
        </div>
      </div>`;
    list.appendChild(card);
  });
}

function renderTower(heelIds, crownIds) {
  const heel = (heelIds || []).filter(id => id && id.trim() !== '');
  const crown = (crownIds || []).filter(id => id && id.trim() !== '');
  if (!heel.length && !crown.length)
    return '<div style="color:#ccc;padding:20px 0;text-align:center;font-size:11px;">AUCUN INGRÉDIENT</div>';
  const crownRev = [...crown].reverse();
  let html = '';
  heel.forEach((id, i) => { if (i > 0) html += '<div class="tdiv"></div>'; html += titem(id); });
  html += `<div class="tmark"><div class="tmark-line"></div><div class="tmark-lbl">CROWN↑HEEL</div><div class="tmark-line"></div></div>`;
  crownRev.forEach((id, i) => { if (i > 0) html += '<div class="tdiv"></div>'; html += titem(id); });
  return html;
}

function titem(id) {
  const ing = bkData.ingredients.find(i => i.id === id);
  if (!ing) return `<div class="titem"><div style="background:#ffeeee;color:#c00;font-size:9px;padding:4px 6px;border-radius:3px;font-weight:700;">${id}</div></div>`;
  return `<div class="titem"><img src="${ing.img}" onerror="this.style.display='none'"><span>${ing.name}</span></div>`;
}

function clearBoards() {
  document.getElementById('heel-zone').innerHTML = '';
  document.getElementById('crown-zone').innerHTML = '';
}

function toggleCfg() {
  const c = document.getElementById('cfg');
  c.style.display = c.style.display === 'block' ? 'none' : 'block';
}

function saveData() {
  try {
    bkData = JSON.parse(document.getElementById('json-input').value);
    currentIdx = 0; score = 0; userHistory = [];
    init(); toggleCfg();
  } catch(e) { alert('JSON invalide !'); }
}

init();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW error:', err));
  });
}
</script>
</body>
</html>
